<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hire me — Web development, 3D experiences, and backend services.">
  <title>Hire Me | Portfolio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080612;
      --bg-alt: #0c0a1a;
      --bg-card: #101024;
      --text: #eeeef8;
      --text-muted: #9090b8;
      --text-dim: #58589a;
      --gold: #4488ff;
      --accent: #00ccff;
      --border-light: rgba(0, 204, 255, 0.1);
      --radius: 8px;
      --radius-sm: 4px;
      --font-display: 'Cinzel', serif;
      --font-body: 'Inter', sans-serif;
      --transition: 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font-body);
      background: var(--bg-alt);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 120% 60% at 25% 35%, rgba(18,8,40,0.6) 0%, transparent 70%),
        radial-gradient(ellipse 100% 70% at 70% 55%, rgba(8,15,45,0.5) 0%, transparent 65%),
        radial-gradient(ellipse 80% 50% at 50% 85%, rgba(25,5,40,0.3) 0%, transparent 55%),
        radial-gradient(ellipse 60% 40% at 10% 70%, rgba(10,5,55,0.25) 0%, transparent 50%),
        radial-gradient(ellipse 50% 30% at 90% 20%, rgba(5,15,50,0.2) 0%, transparent 45%),
        var(--bg);
      animation: nightSkyBreath 8s ease-in-out infinite alternate;
    }

    @keyframes nightSkyBreath {
      0%   { filter: brightness(0.85) saturate(1.1); }
      50%  { filter: brightness(1) saturate(1); }
      100% { filter: brightness(0.9) saturate(1.05); }
    }

    .container { width: 100%; max-width: 1400px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

    .navbar { position: fixed; top: 0; left: 0; right: 0; height: 68px; background: rgba(8,6,18,0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-light); z-index: 100; display: flex; align-items: center; }
    .navbar .container { display: flex; justify-content: space-between; align-items: center; }
    .nav-logo { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; color: var(--text); text-decoration: none; letter-spacing: 2px; }
    .nav-logo span { color: var(--gold); }
    .nav-links { display: flex; gap: 28px; list-style: none; align-items: center; }
    .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 500; transition: color var(--transition); padding: 6px 0; }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }
    .nav-hamburger { display: none; flex-direction: column; gap: 5px; width: 28px; height: 22px; background: none; border: none; cursor: pointer; padding: 0; }
    .nav-hamburger span { display: block; height: 2px; width: 100%; background: var(--text); border-radius: 2px; transition: all var(--transition); }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .page-header {
      padding: 140px 24px 80px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .page-header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 60px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }
    .page-header h1 {
      font-family: var(--font-display);
      font-size: 2.8rem;
      color: var(--text);
      margin-bottom: 16px;
      letter-spacing: 3px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease 0.2s forwards;
    }
    .page-header h1 span { color: var(--gold); }
    .page-header p {
      color: var(--text-muted);
      font-size: 1rem;
      max-width: 500px;
      margin: 0 auto;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s ease 0.4s forwards;
    }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .hire-section {
      padding: 40px 24px 100px;
      max-width: 1000px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      margin-bottom: 80px;
    }

    .project-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: var(--radius);
      transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      overflow: hidden;
      opacity: 0;
      transform: translateY(30px);
      cursor: default;
    }
    .project-card.visible { opacity: 1; transform: translateY(0); }
    .project-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.4); }

    .project-card .card-image {
      position: relative;
      aspect-ratio: 16 / 10;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      overflow: hidden;
    }
    .project-card .card-image::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 60%, rgba(8,6,18,0.9) 100%);
    }
    .project-card .card-image .icon-wrap {
      position: relative;
      z-index: 1;
      width: 64px; height: 64px;
      border-radius: 16px;
      background: rgba(8,6,18,0.6);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; justify-content: center;
    }
    .project-card .card-badge {
      position: absolute;
      top: 12px; left: 12px;
      background: rgba(8,6,18,0.85);
      color: rgba(255,255,255,0.8);
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 4px 9px;
      border-radius: 4px;
      z-index: 2;
    }
    .project-card .card-body {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .project-card .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.65rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .project-card .card-meta .rate { color: var(--gold); font-weight: 600; }
    .project-card .card-body h3 { font-family: var(--font-display); font-size: 1.15rem; color: var(--text); margin-bottom: 2px; }
    .project-card .card-body p { color: var(--text-muted); font-size: 0.85rem; line-height: 1.7; }
    .project-card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .project-card-tags span {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-light);
      color: var(--gold);
      font-size: 0.68rem;
      padding: 4px 8px;
      border-radius: 4px;
      text-transform: uppercase;
    }

    .hire-form {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 40px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      position: relative;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .hire-form.visible { opacity: 1; transform: translateY(0); }
    .hire-form::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 13px;
      padding: 1px;
      background: linear-gradient(135deg, rgba(68,136,255,0.2), transparent, rgba(68,136,255,0.1));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }
    .hire-form h2 {
      font-family: var(--font-display);
      font-size: 1.3rem;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hire-form h2::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border-light), transparent);
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      font-weight: 600;
    }
    .form-group input, .form-group textarea, .form-group select {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 0.88rem;
      width: 100%;
      transition: all var(--transition);
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      outline: none;
      border-color: var(--gold);
      background: rgba(68,136,255,0.04);
      box-shadow: 0 0 20px rgba(68,136,255,0.06);
    }
    .form-group textarea { resize: vertical; min-height: 120px; }
    .form-group select option { background: var(--bg); color: var(--text); }
    .submit-area {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      padding-top: 8px;
    }
    .form-status { font-size: 0.85rem; color: var(--text-muted); }
    .form-status.success { color: #4ade80; }
    .form-status.error { color: #ef4444; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: var(--radius-sm);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: all var(--transition);
      border: 1px solid transparent;
    }
    .btn-primary {
      background: var(--gold);
      color: #0d0d11;
    }
    .btn-primary:hover {
      background: #dfbc5b;
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(68,136,255,0.2);
    }

    .glow-orb {
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
      opacity: 0.15;
      animation: orbFloat 12s ease-in-out infinite alternate;
    }
    .glow-orb-1 {
      top: -100px; right: -100px;
      background: var(--gold);
      animation-delay: 0s;
    }
    .glow-orb-2 {
      bottom: -100px; left: -100px;
      background: var(--accent);
      animation-delay: -6s;
    }

    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(30px, -30px) scale(1.1); }
      66% { transform: translate(-20px, 20px) scale(0.9); }
      100% { transform: translate(20px, -10px) scale(1.05); }
    }

    /* Decorative grid lines */
    .grid-lines {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(68,136,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(68,136,255,0.02) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    @media(max-width: 820px) {
      .nav-hamburger { display: flex; }
      .nav-links { position: fixed; top: 68px; left: 0; right: 0; flex-direction: column; align-items: flex-start; gap: 4px; background: rgba(8,6,18,0.97); backdrop-filter: blur(16px); border-bottom: 1px solid var(--border-light); padding: 12px 24px 20px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
      .nav-links.open { max-height: 70vh; overflow-y: auto; }
      .nav-links a { display: block; width: 100%; padding: 12px 4px; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
    }
    @media(max-width: 768px) {
      .page-header { padding: 110px 16px 60px; }
      .page-header h1 { font-size: 2rem; }
      .hire-section { padding: 30px 16px 80px; }
      .hire-form { padding: 28px 20px; }
    }
    @media(max-width: 600px) {
      .form-row { grid-template-columns: 1fr; }
      .projects-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="glow-orb glow-orb-1"></div>
  <div class="glow-orb glow-orb-2"></div>
  <div class="grid-lines"></div>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo"><span>P</span>ortfolio</a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="projects.html">Projects</a></li>
        <li><a href="hire.html" class="active" style="background:var(--gold);color:var(--bg);padding:8px 18px;border-radius:var(--radius-sm);font-weight:700;">Hire</a></li>
      </ul>
      <button class="nav-hamburger" id="navHamburger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <h1>Hire <span>Me</span></h1>
      <p>Tell me about your project and I'll get back to you as soon as possible.</p>
    </div>
  </header>

  <section class="hire-section">
    <div class="projects-grid" id="servicesGrid"></div>

    <form class="hire-form" id="hireForm">
      <h2>Start a Project</h2>
      <div class="form-row">
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="hireName" required>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="hireEmail" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone (optional)</label>
          <input type="tel" id="hirePhone">
        </div>
        <div class="form-group">
          <label>Service Needed</label>
          <select id="hireService">
            <option value="">Any service</option>
          </select>
        </div>
      </div>
      <div class="form-group full">
        <label>Describe Your Project</label>
        <textarea id="hireDescription" placeholder="Tell me about your project, goals, timeline, and budget..." required></textarea>
      </div>
      <div class="submit-area">
        <button type="submit" class="btn btn-primary" style="padding:12px 32px;font-size:0.9rem;">Send Inquiry <i class="fa-solid fa-arrow-right"></i></button>
        <div class="form-status" id="formStatus"></div>
      </div>
    </form>
  </section>

  <script>
    const API_BASE = '/api';

    function escapeHtml(str) {
      if (!str) return '';
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function getServiceIcon(name) {
      const icons = {
        'web': '<i class="fa-solid fa-globe"></i>',
        '3d': '<i class="fa-solid fa-cubes"></i>',
        'backend': '<i class="fa-solid fa-gear"></i>',
        'design': '<i class="fa-solid fa-palette"></i>',
        'fullstack': '<i class="fa-solid fa-layer-group"></i>',
        'consulting': '<i class="fa-solid fa-handshake"></i>'
      };
      const lower = (name || '').toLowerCase();
      for (const key of Object.keys(icons)) {
        if (lower.includes(key)) return icons[key];
      }
      return '<i class="fa-solid fa-arrow-right"></i>';
    }

    function serviceGradient(name) {
      const gradients = [
        'linear-gradient(135deg, #1a0a2e, #16213e)',
        'linear-gradient(135deg, #0f2027, #203a43)',
        'linear-gradient(135deg, #0d0a2a, #1a1040)',
        'linear-gradient(135deg, #0a1628, #0f2840)',
        'linear-gradient(135deg, #1a0a20, #2a1040)',
        'linear-gradient(135deg, #081828, #0c2840)'
      ];
      let hash = 0;
      for (let i = 0; i < (name || '').length; i++) { hash = ((hash << 5) - hash) + name.charCodeAt(i); hash |= 0; }
      return gradients[Math.abs(hash) % gradients.length];
    }

    function serviceKeywords(name) {
      const map = {
        'web': ['react', 'node', 'responsive'],
        '3d': ['three.js', 'webgl', 'blender'],
        'backend': ['api', 'database', 'server'],
        'design': ['ui/ux', 'figma', 'creative'],
        'fullstack': ['frontend', 'backend', 'devops'],
        'consulting': ['strategy', 'review', 'advice']
      };
      const lower = (name || '').toLowerCase();
      for (const key of Object.keys(map)) {
        if (lower.includes(key)) return map[key];
      }
      return ['custom', 'development'];
    }

    async function loadServices() {
      try {
        const res = await fetch(API_BASE + '/data');
        const json = await res.json();
        if (json.success && json.data && json.data.services) {
          const grid = document.getElementById('servicesGrid');
          const select = document.getElementById('hireService');
          json.data.services.forEach(function(s, i) {
            const keywords = serviceKeywords(s.name);
            const gradient = serviceGradient(s.name);
            const icon = getServiceIcon(s.name);
            grid.innerHTML += '<div class="project-card" style="transition-delay:' + (i * 0.08) + 's">'
              + '<div class="card-image" style="background:' + gradient + ';">'
                + '<span class="card-badge">' + escapeHtml(s.name) + '</span>'
                + '<div class="icon-wrap">' + icon + '</div>'
              + '</div>'
              + '<div class="card-body">'
                + '<div class="card-meta"><span>per hour</span><span class="rate">$' + escapeHtml(String(s.hourlyRate)) + '</span></div>'
                + '<h3>' + escapeHtml(s.name) + '</h3>'
                + '<p>' + escapeHtml(s.description) + '</p>'
                + '<div class="project-card-tags">' + keywords.map(function(t) { return '<span>' + t + '</span>'; }).join('') + '</div>'
              + '</div>'
            + '</div>';
            select.innerHTML += '<option value="' + escapeHtml(s.name) + '">' + escapeHtml(s.name) + '</option>';
          });
          requestAnimationFrame(function() {
            document.querySelectorAll('.project-card').forEach(function(el) {
              el.classList.add('visible');
            });
          });
        }
      } catch (e) {}
    }

    document.addEventListener('DOMContentLoaded', function() {

      setTimeout(function() {
        document.getElementById('hireForm').classList.add('visible');
      }, 300);

      loadServices();

      document.getElementById('hireForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var status = document.getElementById('formStatus');
        var btn = this.querySelector('.btn');
        status.textContent = 'Sending...';
        status.className = 'form-status';
        btn.disabled = true;
        btn.style.opacity = '0.6';

        try {
          var res = await fetch(API_BASE + '/hire', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              name: document.getElementById('hireName').value.trim(),
              email: document.getElementById('hireEmail').value.trim(),
              phone: document.getElementById('hirePhone').value.trim(),
              service: document.getElementById('hireService').value,
              description: document.getElementById('hireDescription').value.trim()
            })
          });
          var json = await res.json();
          if (json.success) {
            status.innerHTML = '<i class="fa-solid fa-check"></i> Inquiry sent! I\'ll get back to you soon.';
            status.className = 'form-status success';
            document.getElementById('hireForm').reset();
          } else {
            status.textContent = json.error || 'Something went wrong.';
            status.className = 'form-status error';
          }
        } catch (err) {
          status.textContent = 'Connection error. Is the server running?';
          status.className = 'form-status error';
        } finally {
          btn.disabled = false;
          btn.style.opacity = '1';
        }
      });
    });

    const navHamburger = document.getElementById("navHamburger");
    if (navHamburger) {
      navHamburger.addEventListener("click", function() {
        this.classList.toggle("open");
        document.getElementById("navLinks")?.classList.toggle("open");
      });
    }
  </script>
</body>
</html>
