<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Projects — A collection of work and side projects.">
  <title>Projects | Portfolio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { overflow-y: auto; background: var(--bg-alt); }
    .page-header { padding: 120px 24px 60px; text-align: center; border-bottom: 1px solid var(--border-light); background: var(--bg); }
    .page-header h1 { font-family: var(--font-display); font-size: 2.2rem; color: var(--text); margin-bottom: 12px; }
    .page-header p { color: var(--text-muted); font-size: 0.95rem; max-width: 600px; margin: 0 auto; }
    .portfolio-section { padding: 60px 24px; max-width: 1200px; margin: 0 auto; }
    .filter-bar { display: flex; justify-content: center; gap: 12px; margin-bottom: 40px; flex-wrap: wrap; }
    .filter-btn { background: rgba(255,255,255,0.02); border: 1px solid var(--border-light); color: var(--text-muted); padding: 8px 16px; border-radius: var(--radius-sm); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all var(--transition); }
    .filter-btn:hover, .filter-btn.active { color: var(--text); background: rgba(68,136,255,0.08); border-color: var(--gold); }
    .projects-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    .project-card { background: var(--bg-card); border: 1px solid var(--border-light); border-radius: var(--radius); padding: 24px; transition: all var(--transition); display: flex; flex-direction: column; gap: 16px; }
    .project-card:hover { border-color: var(--accent); transform: translateY(-4px); box-shadow: 0 12px 32px rgba(0,0,0,0.4); }
    .project-card h3 { font-family: var(--font-display); font-size: 1.15rem; color: var(--text); }
    .project-card p { color: var(--text-muted); font-size: 0.88rem; line-height: 1.6; flex: 1; }
    .project-card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .project-card-tags span { background: rgba(255,255,255,0.03); border: 1px solid var(--border-light); color: var(--gold); font-size: 0.68rem; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; }
    .project-card-links { display: flex; gap: 12px; font-size: 0.8rem; }
    .project-card-links a { color: var(--text); text-decoration: none; font-weight: 600; transition: color var(--transition); }
    .project-card-links a:hover { color: var(--gold); }
    @media(max-width: 768px) { .projects-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="nav-logo"><span>P</span>ortfolio</a>
      <ul class="nav-links" id="navLinks">
        <li><a href="index.html">Home</a></li>
        <li><a href="projects.html" class="active">Projects</a></li>
        <li><a href="hire.html" style="background:var(--gold);color:var(--bg);padding:8px 18px;border-radius:var(--radius-sm);font-weight:700;">Hire</a></li>
        </ul>
      <button class="nav-hamburger" id="navHamburger" aria-label="Menu"><span></span><span></span><span></span></button>
    </div>
  </nav>

  <header class="page-header">
    <div class="container">
      <h1>Projects</h1>
      <p>A collection of projects spanning web development, 3D graphics, and software engineering.</p>
    </div>
  </header>

  <section class="portfolio-section">
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="webgl">WebGL</button>
      <button class="filter-btn" data-filter="networks">Networks</button>
    </div>
    <div class="projects-grid" id="projectsGrid"></div>
  </section>

  <script src="js/data.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (typeof getData !== 'function') return;
      const projects = getData().projects;
      const grid = document.getElementById('projectsGrid');
      const filterBar = document.getElementById('filterBar');

      function render(category) {
        const filtered = category === 'all' ? projects : projects.filter(p => p.category === category);

        grid.innerHTML = filtered.map(pr => `
          <div class="project-card" style="padding:0;overflow:hidden;cursor:${pr.liveUrl&&pr.liveUrl!=='#'?'pointer':'default'};" onclick="${pr.liveUrl&&pr.liveUrl!=='#'?`window.open('${pr.liveUrl}','_blank','noopener')`:''}">
            <div style="position:relative;aspect-ratio:16/10;background:#0a0814 url('${escapeHtml(pr.image||'')}') center/cover;">
              <span style="position:absolute;top:10px;left:10px;background:rgba(8,6,18,0.85);color:rgba(255,255,255,0.8);font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;padding:4px 9px;border-radius:4px;">${escapeHtml(pr.type||'')}</span>
              ${pr.featured?`<span style="position:absolute;top:10px;right:10px;background:var(--gold);color:#0d0d11;font-size:0.6rem;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;padding:4px 9px;border-radius:4px;"><i class="fa-solid fa-star"></i> Featured</span>`:''}
            </div>
            <div style="padding:20px 24px;">
              <div style="display:flex;justify-content:space-between;font-size:0.65rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;"><span>${escapeHtml(pr.year||'')}</span><span style="color:var(--gold);">${escapeHtml(pr.stack||'')}</span></div>
              <h3 style="margin-bottom:2px;">${escapeHtml(pr.title)}</h3>
              <div style="font-size:0.78rem;color:var(--gold);margin-bottom:10px;">${escapeHtml(pr.subtitle||'')}</div>
              <p>${escapeHtml(pr.description)}</p>
              <div class="project-card-tags" style="margin:12px 0;">${pr.tags.map(t => `<span>${escapeHtml(t)}</span>`).join('')}</div>
              <div class="project-card-links">
                ${pr.liveUrl&&pr.liveUrl!=='#'?`<a href="${pr.liveUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation();">Live <i class="fa-solid fa-arrow-right"></i></a>`:''}
                ${pr.sourceUrl&&pr.sourceUrl!=='#'?`<a href="${pr.sourceUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation();" style="color:var(--text-muted);">Source</a>`:''}
              </div>
            </div>
          </div>
        `).join('');
      }

      render('all');

      filterBar.addEventListener('click', e => {
        const btn = e.target.closest('.filter-btn');
        if (!btn) return;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render(btn.dataset.filter);
      });
    });

    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    const navHamburger = document.getElementById("navHamburger");
    if (navHamburger) {
      navHamburger.addEventListener("click", () => {
        navHamburger.classList.toggle("open");
        document.getElementById("navLinks")?.classList.toggle("open");
      });
    }
  </script>
</body>
</html>
